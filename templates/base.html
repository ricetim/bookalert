<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookalert{% block page_title %}{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
  <style>
    body { display: flex; min-height: 100vh; }

    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #1e2126;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      border-right: 1px solid #2d3139;
      z-index: 100;
    }

    #sidebar .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    #sidebar .nav-link {
      color: #94a3b8;
      border-radius: .375rem;
      padding: .5rem .75rem;
      margin-bottom: .25rem;
      font-size: .9rem;
    }

    #sidebar .nav-link:hover,
    #sidebar .nav-link.active {
      color: #e2e8f0;
      background: #2d3139;
    }

    #main {
      margin-left: 220px;
      flex: 1;
      padding: 2rem;
      min-width: 0;
    }

    .table-dark th { color: #94a3b8; font-weight: 500; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    .price-ok { color: #22c55e; font-weight: 600; }
    .price-high { color: #94a3b8; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav id="sidebar">
  <div class="brand">📚 Bookalert</div>
  <ul class="nav flex-column">
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint == 'books' %}active{% endif %}" href="{{ url_for('books') }}">Books</a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint in ('add_form', 'add_submit') %}active{% endif %}" href="{{ url_for('add_form') }}">Add Book</a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint == 'alerts' %}active{% endif %}" href="{{ url_for('alerts') }}">Alerts</a>
    </li>
  </ul>
</nav>

<main id="main">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
