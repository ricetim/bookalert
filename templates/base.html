<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookalert{% block page_title %}{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='fonts.css') }}">
  <script src="{{ url_for('static', filename='htmx.min.js') }}" defer></script>
  <script src="{{ url_for('static', filename='chart.umd.min.js') }}" defer></script>
  <style>
    :root {
      --bg-base:      #1a1d23;
      --bg-sidebar:   #13151b;
      --bg-card:      #20232c;
      --bg-surface:   #272b35;
      --bg-hover:     #2c3141;
      --border:       #2e3340;
      --border-light: #3a3f52;
      --accent:       #4ea8de;
      --accent-dark:  #3b92c4;
      --accent-dim:   rgba(78,168,222,0.12);
      --accent-text:  #7ec8f0;
      --text-primary: #e2e8f0;
      --text-secondary:#94a3b8;
      --text-muted:   #576070;
      --green:        #22c55e;
      --green-dim:    rgba(34,197,94,0.1);
      --green-border: rgba(34,197,94,0.25);
      --red:          #ef4444;
      --red-dim:      rgba(239,68,68,0.1);
      --red-border:   rgba(239,68,68,0.3);
      --font-ui:      'Outfit', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Sidebar ─────────────────────────────────── */
    #sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--bg-sidebar);
      padding: 1.5rem 0.75rem 1.5rem;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      border-right: 1px solid var(--border);
      z-index: 100;
    }

    .brand {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.75rem 0;
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
    }

    .brand:hover { color: var(--accent-text); }

    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 0.75rem;
      margin-bottom: 0.35rem;
    }

    .sidebar-nav { list-style: none; }
    .sidebar-nav li { margin-bottom: 1px; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 400;
      transition: color 0.15s, background 0.15s;
      border-left: 2px solid transparent;
    }

    .sidebar-nav a:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .sidebar-nav a.active {
      color: var(--accent-text);
      background: var(--accent-dim);
      border-left-color: var(--accent);
      font-weight: 500;
    }

    /* ── Main ────────────────────────────────────── */
    #main {
      margin-left: 210px;
      flex: 1;
      padding: 2rem 2.25rem 3rem;
      min-width: 0;
    }

    /* ── Page header ─────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Cards ───────────────────────────────────── */
    .ba-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .ba-card-body { padding: 1.5rem; }

    /* ── Tables ──────────────────────────────────── */
    .ba-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ba-table thead th {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--bg-sidebar);
    }

    .ba-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      animation: rowIn 0.25s ease both;
    }

    .ba-table tbody tr:last-child { border-bottom: none; }
    .ba-table tbody tr:hover { background: var(--bg-hover); }

    .ba-table td {
      padding: 0.8rem 1rem;
      vertical-align: middle;
      font-size: 0.875rem;
      color: var(--text-primary);
    }

    {% for i in range(25) %}
    .ba-table tbody tr:nth-child({{ i + 1 }}) { animation-delay: {{ "%.2f"|format(i * 0.03) }}s; }
    {% endfor %}

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-3px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Price indicators ────────────────────────── */
    .price-ok {
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 500;
    }

    .price-high {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.82rem;
    }

    .price-val {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-primary);
    }

    .td-secondary { color: var(--text-secondary) !important; }
    .td-muted     { color: var(--text-muted) !important; }
    .td-mono      { font-family: var(--font-mono) !important; font-size: 0.78rem !important; }

    /* ── Buttons ─────────────────────────────────── */
    .btn-primary {
      background: var(--accent);
      color: #0d1117;
      border: none;
      font-family: var(--font-ui);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.5rem 1.1rem;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover { background: var(--accent-dark); color: #0d1117; }

    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border-light);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.5rem 1.1rem;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-light);
    }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
    }

    .btn-ghost-sm {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-ghost-sm:hover {
      color: var(--text-primary);
      border-color: var(--border-light);
      background: var(--bg-hover);
    }

    .btn-danger-ghost {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-danger-ghost:hover {
      color: var(--red);
      border-color: var(--red-border);
      background: var(--red-dim);
    }

    /* ── Forms ───────────────────────────────────── */
    .ba-field { margin-bottom: 1.25rem; }

    .ba-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .ba-input {
      display: block;
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      border-radius: 5px;
      padding: 0.6rem 0.85rem;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    .ba-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .ba-input::placeholder { color: var(--text-muted); }

    .ba-hint {
      font-size: 0.77rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }

    .ba-prefix-wrap {
      display: flex;
      align-items: stretch;
    }

    .ba-prefix {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-light);
      border-right: none;
      color: var(--text-muted);
      padding: 0.6rem 0.75rem;
      border-radius: 5px 0 0 5px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
    }

    .ba-prefix + .ba-input { border-radius: 0 5px 5px 0; }

    /* ── Alerts / notices ────────────────────────── */
    .ba-error {
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      border-left: 3px solid var(--red);
      color: var(--text-primary);
      padding: 0.7rem 1rem;
      border-radius: 5px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }

    /* ── Badge ───────────────────────────────────── */
    .badge-met {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green-border);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border-radius: 3px;
    }

    /* ── Book cover ──────────────────────────────── */
    .book-cover {
      width: 38px;
      height: 54px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border-light);
      flex-shrink: 0;
      display: block;
    }

    /* ── Spinner ─────────────────────────────────── */
    .ba-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Utility ─────────────────────────────────── */
    .mono { font-family: var(--font-mono) !important; }

    a.link-silent {
      text-decoration: none;
      color: var(--text-primary);
    }

    a.link-silent:hover { color: var(--accent-text); }

    a.link-muted {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 500;
    }

    a.link-muted:hover { color: var(--text-secondary); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav id="sidebar">
  <a class="brand" href="{{ url_for('books') }}">
    <span>📚</span> Bookalert
  </a>

  <div class="nav-section-label">Main</div>
  <ul class="sidebar-nav">
    <li>
      <a class="{% if request.endpoint == 'books' %}active{% endif %}"
         href="{{ url_for('books') }}">Books</a>
    </li>
    <li>
      <a class="{% if request.endpoint in ('add_form', 'add_submit') %}active{% endif %}"
         href="{{ url_for('add_form') }}">Add Book</a>
    </li>
    <li>
      <a class="{% if request.endpoint == 'alerts' %}active{% endif %}"
         href="{{ url_for('alerts') }}">Alerts</a>
    </li>
  </ul>
</nav>

<main id="main">
  {% block content %}{% endblock %}
</main>

</body>
</html>
