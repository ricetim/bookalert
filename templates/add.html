{% extends "base.html" %}
{% block page_title %} — Add Book{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Add Book</h1>
</div>

<div style="max-width:460px">
  <div class="ba-card ba-card-body">
    {% if errors %}
    <div class="ba-error">
      {% for e in errors %}<div>{{ e }}</div>{% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{{ url_for('add_submit') }}">
      <div class="ba-field">
        <label class="ba-label" for="isbn">ISBN</label>
        <input id="isbn" type="text" name="isbn"
               class="ba-input"
               value="{{ isbn or '' }}"
               placeholder="e.g. 9780143127741"
               autocomplete="off"
               required>
        <div class="ba-hint">10 or 13 digit ISBN</div>
      </div>

      <div class="ba-field">
        <label class="ba-label" for="target_price">Target Price (USD)</label>
        <div class="ba-prefix-wrap">
          <span class="ba-prefix">$</span>
          <input id="target_price" type="number" name="target_price"
                 step="0.01" min="0.01"
                 class="ba-input"
                 value="{{ target_price or '' }}"
                 placeholder="12.00"
                 required>
        </div>
        <div class="ba-hint">Alert when lowest price is at or below this</div>
      </div>

      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:.65rem">
        Add Book
      </button>
    </form>
  </div>
</div>
{% endblock %}
