<div class="mt-4">
{% if status == "done" %}
  <div class="card bg-dark border-success">
    <div class="card-body">
      <h5 class="card-title text-success mb-1">Book Added</h5>
      <p class="mb-1 fw-semibold">{{ job['title'] }}</p>
      <p class="text-secondary mb-2 small">{{ job['author'] }} &nbsp;·&nbsp; ISBN {{ job['isbn'] }}</p>
      <p class="mb-0">
        Current lowest price: <strong>{{ job['price'] }}</strong>
        &nbsp;·&nbsp; Target: {{ job['target'] }}
      </p>
      <div class="mt-3">
        <a href="{{ url_for('books') }}" class="btn btn-outline-success btn-sm me-2">View Books</a>
        <a href="{{ url_for('add_form') }}" class="btn btn-outline-secondary btn-sm">Add Another</a>
      </div>
    </div>
  </div>
{% else %}
  <div class="card bg-dark border-danger">
    <div class="card-body">
      <h5 class="card-title text-danger mb-1">Failed to Add Book</h5>
      <p class="text-secondary mb-3">{{ message }}</p>
      <a href="{{ url_for('add_form') }}" class="btn btn-outline-secondary btn-sm">Try Again</a>
    </div>
  </div>
{% endif %}
</div>
