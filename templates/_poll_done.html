<div style="max-width:460px">
{% if status == "done" %}
  <div class="ba-card" style="border-top:2px solid var(--green)">
    <div class="ba-card-body">
      <div style="font-size:1rem;font-weight:600;margin-bottom:0.15rem">{{ job['title'] }}</div>
      <div style="color:var(--text-muted);font-size:0.82rem;margin-bottom:1rem">
        {{ job['author'] }}
        &nbsp;·&nbsp;
        <span class="mono">{{ job['isbn'] }}</span>
      </div>
      <div style="display:flex;gap:2rem;margin-bottom:1.25rem">
        <div>
          <div style="font-size:0.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.25rem">Current lowest</div>
          <div class="mono" style="font-size:1rem;color:var(--green)">{{ job['price'] }}</div>
        </div>
        <div>
          <div style="font-size:0.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.25rem">Your target</div>
          <div class="mono" style="font-size:1rem;color:var(--text-primary)">{{ job['target'] }}</div>
        </div>
      </div>
      <div style="display:flex;gap:0.6rem">
        <a href="{{ url_for('books') }}" class="btn-primary btn-sm">View Books</a>
        <a href="{{ url_for('add_form') }}" class="btn-secondary btn-sm">Add Another</a>
      </div>
    </div>
  </div>
{% else %}
  <div class="ba-card" style="border-top:2px solid var(--red)">
    <div class="ba-card-body">
      <div style="font-size:0.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin-bottom:.5rem">
        Failed to add book
      </div>
      <div style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:1.25rem">{{ message }}</div>
      <a href="{{ url_for('add_form') }}" class="btn-secondary btn-sm">Try Again</a>
    </div>
  </div>
{% endif %}
</div>
