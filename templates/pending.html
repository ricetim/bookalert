{% extends "base.html" %}
{% block title %}Adding Book — Bookalert{% endblock %}

{% block content %}
<h1 class="h4 mb-4">Adding Book</h1>

<div style="max-width: 500px;">
  <div id="poll-{{ job_id }}"
       hx-get="{{ url_for('add_poll', job_id=job_id) }}"
       hx-trigger="every 2s"
       hx-swap="outerHTML">
    <div class="card bg-dark border-secondary">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="spinner-border spinner-border-sm text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <div class="text-secondary">
          Fetching book info for ISBN <span class="font-monospace">{{ isbn }}</span>…
          <br><small>This may take 10–20 seconds.</small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
