{% extends "base.html" %}
{% block page_title %} — Adding Book{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Adding Book</h1>
</div>

<div style="max-width:460px">
  <div id="poll-{{ job_id }}"
       hx-get="{{ url_for('add_poll', job_id=job_id) }}"
       hx-trigger="every 2s"
       hx-swap="outerHTML">
    <div class="ba-card ba-card-body">
      <div style="display:flex;align-items:center;gap:1rem">
        <div class="ba-spinner"></div>
        <div>
          <div style="font-weight:500;margin-bottom:0.2rem">
            Fetching book info for <span class="mono" style="color:var(--accent-text)">{{ isbn }}</span>
          </div>
          <div style="color:var(--text-muted);font-size:0.8rem">
            Fetching live prices — this may take 10–20 seconds.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
